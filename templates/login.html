{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative">
    <div class="max-w-md w-full space-y-8 glass-card p-10 reveal">
        <div class="text-center">
            <div class="mx-auto h-16 w-16 bg-accent rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(167,255,131,0.3)] mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0A140F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 2 5.5A7 7 0 0 1 7 13.2V20Z"/><path d="M9 20v-5.4a4 4 0 0 1 .4-1.8L11 9"/></svg>
            </div>
            <h2 class="text-4xl font-black hero-gradient-text tracking-tighter mb-2 uppercase">SECURE OATH</h2>
            <p class="text-[10px] uppercase font-bold tracking-[0.4em] text-text-dim">MusaCare Node Authentication</p>
        </div>
        
        <form class="mt-10 space-y-6" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold tracking-widest text-text-dim ml-4 mb-2 block">User Identifier</label>
                    <input name="username" type="text" required class="w-full" placeholder="Enter secure id...">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold tracking-widest text-text-dim ml-4 mb-2 block">Coded Key</label>
                    <input name="password" type="password" required class="w-full" placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between px-4">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-white/10 bg-white/5 text-accent focus:ring-accent">
                    <label for="remember-me" class="ml-2 block text-[10px] uppercase tracking-widest font-bold text-text-dim">Keep Active</label>
                </div>
                <div class="text-[10px] uppercase tracking-widest font-bold">
                    <a href="#" class="text-accent hover:underline">Lost Link?</a>
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-5 px-4 border border-transparent text-xs font-black rounded-2xl text-bg-deep bg-accent hover:scale-[1.02] focus:outline-none transition-all shadow-[0_15px_30px_rgba(167,255,131,0.2)] uppercase tracking-widest">
                    Synchronize
                </button>
            </div>

            <p class="text-center text-[10px] uppercase tracking-widest text-text-dim">
                New across node? <a href="{% url 'register' %}" class="text-accent font-black hover:underline">Forge ID</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
