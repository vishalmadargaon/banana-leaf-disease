{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative">
    <div class="max-w-md w-full space-y-8 glass-card p-10 reveal">
        <div class="text-center">
            <div class="mx-auto h-16 w-16 bg-accent rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(167,255,131,0.3)] mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0A140F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
            </div>
            <h2 class="text-4xl font-black hero-gradient-text tracking-tighter mb-2 uppercase">FORGE IDENTITY</h2>
            <p class="text-[10px] uppercase font-bold tracking-[0.4em] text-text-dim">MusaCare Network Registration</p>
        </div>
        
        <form class="mt-10 space-y-6" action="{% url 'register' %}" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold tracking-widest text-text-dim ml-4 mb-2 block">Choose Unique ID</label>
                    <input name="username" type="text" required class="w-full" placeholder="Public alias...">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold tracking-widest text-text-dim ml-4 mb-2 block">Master Key</label>
                    <input name="password" type="password" required class="w-full" placeholder="Min 8 characters">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold tracking-widest text-text-dim ml-4 mb-2 block">Confirm Key</label>
                    <input name="password_confirm" type="password" required class="w-full" placeholder="Verify code...">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-5 px-4 border border-transparent text-xs font-black rounded-2xl text-bg-deep bg-accent hover:scale-[1.02] focus:outline-none transition-all shadow-[0_15px_30px_rgba(167,255,131,0.2)] uppercase tracking-widest">
                    Forge Link
                </button>
            </div>

            <p class="text-center text-[10px] uppercase tracking-widest text-text-dim">
                Already registered? <a href="{% url 'login' %}" class="text-accent font-black hover:underline">Sync Access</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
