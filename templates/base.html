{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusaCare — Agri-Engine</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #A7FF83;
            --bg-deep: #0A140F;
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        .light {
            --accent: #10B981;
            --bg-deep: #F9FAF9;
            --text-main: #0A140F;
            --text-dim: rgba(0, 0, 0, 0.4);
            --glass: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow: hidden;
        }

        .hero-gradient-text {
            background: linear-gradient(135deg, var(--text-main) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 2.5rem;
        }

        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
        .animate-scan { animation: scan 4s linear infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 10px; }
        
        .reveal { animation: reveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-accent/20">
    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="relative z-20 w-72 bg-black/5 backdrop-blur-3xl border-r border-white/5 flex flex-col pt-10 pb-6 shrink-0 transition-all duration-500">
            <div class="px-8 mb-12">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(167,255,131,0.2)]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-bg-deep"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 2 5.5A7 7 0 0 1 7 13.2V20Z"/><path d="M9 20v-5.4a4 4 0 0 1 .4-1.8L11 9"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-black tracking-tighter transition-colors">MUSACARE</h1>
                        <p class="text-[8px] uppercase tracking-[0.3em] text-accent font-bold">Agri-Engine v4.0</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-1">
                <a href="{% url 'dashboard' %}" class="flex items-center gap-4 px-6 py-4 rounded-2xl transition-all group {% if request.resolver_match.url_name == 'dashboard' %}bg-accent/10 border border-accent/20 text-accent{% else %}text-text-dim hover:text-white hover:bg-white/5{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <span class="text-[10px] uppercase font-bold tracking-widest">Analysis Feed</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-6 py-4 rounded-2xl text-text-dim hover:text-white hover:bg-white/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 20 2-2 5-5"/><path d="M6 3v12"/><path d="M6 15h12"/><path d="M11 3v7"/><path d="M11 13h4"/><path d="M16 3v4"/><path d="M16 10h2"/></svg>
                    <span class="text-[10px] uppercase font-bold tracking-widest">History</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-6 py-4 rounded-2xl text-text-dim hover:text-white hover:bg-white/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span class="text-[10px] uppercase font-bold tracking-widest">Settings</span>
                </a>
            </nav>

            <div class="px-6 mt-auto">
                <div class="p-4 rounded-3xl bg-black/5 border border-white/5 flex items-center gap-4 overflow-hidden min-w-0">
                    <div class="w-10 h-10 rounded-full bg-accent/20 border border-accent/30 flex items-center justify-center text-accent font-black text-xs shrink-0">
                        VM
                    </div>
                    <div class="min-w-0">
                        <p class="text-[10px] font-black tracking-tight truncate">{% if user.is_authenticated %}{{ user.username }}{% else %}Vishal M.{% endif %}</p>
                        <a href="{% url 'logout' %}" class="text-[8px] uppercase tracking-widest text-accent hover:underline">Secure Logout</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="relative z-10 flex-1 flex flex-col min-w-0">
            <header class="sticky top-0 z-30 px-12 py-8 border-b border-white/5 bg-transparent backdrop-blur-md flex justify-between items-center transition-all duration-500">
                <div>
                    <h2 class="text-xl font-black uppercase tracking-widest mb-1 flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-accent shadow-[0_0_10px_var(--accent)]"></span>
                        Foliage Matrix
                    </h2>
                    <p class="text-[10px] uppercase tracking-[0.4em] text-text-dim font-medium lowercase">node . alpha . v4</p>
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="themeToggle" class="w-10 h-10 rounded-xl border border-white/10 bg-white/5 flex items-center justify-center transition-all hover:scale-105 active:scale-95 cursor-pointer">
                        <svg id="sunIcon" class="hidden text-accent" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                        <svg id="moonIcon" class="text-accent" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                    </button>
                    <div class="px-4 py-2 rounded-xl bg-accent/5 border border-accent/20 flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span>
                        <span class="text-[10px] uppercase font-bold text-accent tracking-widest">Neural Link: Online</span>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto custom-scrollbar">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const html = document.documentElement;

        // Persistent theme logic
        if (localStorage.getItem('theme') === 'light') {
            html.classList.remove('dark');
            html.classList.add('light');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        }

        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
